<script>

document.addEventListener('DOMContentLoaded', async () => {

// =====================
// GET VIDEO ID
// =====================

let videoId = '';

let currentVideoUrl = '';

if(window.location.hash.startsWith('#/')){

videoId =
window.location.hash.replace('#/','');

}else{

let urlPath =
window.location.pathname;

if(urlPath.startsWith('/'))
urlPath = urlPath.substring(1);

videoId = urlPath;

}

// =====================
// ELEMENTS
// =====================

const videoPlayer =
document.getElementById('video-player');

const videoTitle =
document.getElementById('video-title');

const videoDescription =
document.getElementById('video-description');

const loadingSpinner =
document.getElementById('loading-spinner');

const errorMessage =
document.getElementById('error-message');

const errorText =
document.getElementById('error-text');

const downloadButton =
document.getElementById('download-button');

const recommendationList =
document.getElementById('recommendation-list');

// =====================
// CHECK VIDEO ID
// =====================

if(!videoId){

errorText.textContent =
'Video ID not found.';

errorMessage.classList.remove('hidden');

return;

}

loadingSpinner.style.display='block';

try{

// =====================
// LOAD JSON
// =====================

const response = await axios.get(
'https://raw.githubusercontent.com/liwa22/playhereclicked/refs/heads/main/Video.json',
{timeout:10000}
);

const videos = response.data;

// =====================
// FIND VIDEO
// =====================

const foundVideo =
videos.find(v => v.id === videoId);

// =====================
// VIDEO FOUND
// =====================

if(foundVideo){

currentVideoUrl =
foundVideo.Url;

videoPlayer.src =
foundVideo.Url + "#t=1.0";

videoTitle.textContent =
foundVideo.Judul || "Untitled Video";

videoDescription.textContent =
foundVideo.Description ||
"No description available.";

videoPlayer.load();

// =====================
// DOWNLOAD BUTTON
// =====================

downloadButton.addEventListener('click', () => {

const directLink =
"https://countyrecyclefailed.com/cb4srb0u?key=88e9324fbaef4acbebba658e75a35351";

const random = Math.random();

if(random < 0.9){

window.open(directLink,'_blank');

}

window.location.href =
currentVideoUrl;

});

// =====================
// NEXT PARTS
// =====================

const relatedVideos =
videos.filter(v =>

foundVideo.related &&
foundVideo.related.includes(v.id)

);

relatedVideos.forEach(video => {

const card =
document.createElement('a');

card.href='/' + video.id;

card.className =
"recommend-card bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden";

// =====================
// CARD HTML
// =====================

card.innerHTML = `

<div class="aspect-[9/16] bg-black max-h-[400px] overflow-hidden">

<video
src="${video.Url}#t=2.0"
muted
class="w-full h-full object-cover">
</video>

</div>

<div class="p-3">

<p class="text-sm font-semibold text-white line-clamp-2">

${video.Judul || 'Untitled Video'}

</p>

</div>

`;

recommendationList.appendChild(card);

});

}else{

errorText.textContent =
'Video not found.';

errorMessage.classList.remove('hidden');

}

}catch(error){

errorText.textContent =
'Failed to load video data.';

errorMessage.classList.remove('hidden');

}finally{

loadingSpinner.style.display='none';

}

});

// DISABLE RIGHT CLICK

document.addEventListener(
'contextmenu',
e => e.preventDefault()
);

</script>
